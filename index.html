<!DOCTYPE html>
<html lang="tg">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barodar Cargo Calc</title>
  <!-- Пайваст кардани китобхона барои Excel -->
  <script src="https://cdnjs.cloudflare.com"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 5px;
      background-color: #f0f2f5;
    }

    .container {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 1.3rem;
    }

    .cargo-red {
      color: #d93025;
    }

    .price-settings {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
      padding: 10px;
      background: #eef2f7;
      border-radius: 8px;
      flex-wrap: wrap;
    }

    .price-settings label {
      font-weight: bold;
      font-size: 13px;
      color: #444;
    }

    .price-settings input {
      width: 60px;
      padding: 4px;
      border: 2px solid #007bff;
      border-radius: 4px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1200px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }

    th {
      background-color: #f8f9fa;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .yellow-bg {
      background-color: #fff9c4 !important;
    }

    input {
      width: 92%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 5px;
      font-size: 12px;
      text-align: center;
    }

    input:focus {
      border-color: #d93025;
      outline: none;
      background-color: #fffde7;
    }

    .result-cell {
      font-weight: bold;
      color: #2c3e50;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: 0.3s;
    }

    .btn-add {
      background-color: #28a745;
    }

    .btn-save-txt {
      background-color: #007bff;
    }

    .btn-save-excel {
      background-color: #1d6f42;
    }

    /* Ранги Excel */
    @media (max-width: 600px) {
      .price-settings {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <h2>BARODAR <span class="cargo-red">CARGO</span></h2>

  <datalist id="tajik-names">
    <option value="Абдулло">
    <option value="Алишер">
    <option value="Дилшод">
    <option value="Мадина">
    <option value="Рустам">
  </datalist>

  <datalist id="tajik-districts">
    <option value="Душанбе">
    <option value="Хуҷанд">
    <option value="Бохтар">
    <option value="Кӯлоб">
    <option value="Данғара">
  </datalist>

  <div class="price-settings">
    <div><label>Нархи 1 КГ: </label><input type="number" id="p-kg" value="25" oninput="calc()"></div>
    <div><label>Нархи 1 КУБ: </label><input type="number" id="p-cub" value="450" oninput="calc()"></div>
  </div>

  <div class="container">
    <table id="cargoTable">
      <thead>
        <tr>
          <th rowspan="3">№</th>
          <th rowspan="3">Сана</th>
          <th rowspan="3">АДРЕС</th>
          <th rowspan="3">Ном</th>
          <th rowspan="3">Тел</th>
          <th colspan="2">Ҳамагӣ бор</th>
          <th colspan="3">Обём (м)</th>
          <th colspan="2">Ҳамагӣ</th>
          <th rowspan="3" class="yellow-bg">Ҳосили куб маблағ</th>
          <th rowspan="3" class="yellow-bg">Ҳамагӣ маблағ</th>
        </tr>
        <tr>
          <th rowspan="2">шум</th>
          <th rowspan="2">кг</th>
          <th>Дар.</th>
          <th>Бар</th>
          <th>Бал.</th>
          <th rowspan="2">Куб</th>
          <th rowspan="2">кг Сум</th>
        </tr>
        <tr>
          <th>(м)</th>
          <th>(м)</th>
          <th>(м)</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot>
        <tr style="background:#e9ecef; font-weight:bold;">
          <td colspan="5" style="text-align:right">ҶАМЪБАСТ:</td>
          <td id="t-count">0</td>
          <td id="t-kg">0</td>
          <td colspan="3">---</td>
          <td id="t-cub">0.000</td>
          <td id="t-kg-money">0</td>
          <td id="t-cub-money" class="yellow-bg">0</td>
          <td id="t-total" class="yellow-bg">0</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="btn-group">
    <button class="btn btn-add" onclick="addRow()">+ Иловаи сатр</button>
    <button class="btn btn-save-txt" onclick="saveToFile()">💾 Захира (.txt)</button>
    <button class="btn btn-save-excel" onclick="saveToExcel()">📊 Захира (.excel)</button>
  </div>

  <script>
    let rowCount = 0;
    const today = new Date().toISOString().split('T')[0];

    function addRow() {
      rowCount++;
      const row = document.createElement('tr');
      row.innerHTML = `
                <td>${rowCount}</td>
                <td><input type="date" class="v-date" value="${today}"></td>
                <td><input type="text" class="v-addr" list="tajik-districts" placeholder="Адрес"></td>
                <td><input type="text" class="v-name" list="tajik-names" placeholder="Ном"></td>
                <td><input type="text" class="v-tel" placeholder="Тел"></td>
                <td><input type="number" class="v-cnt" value="0" oninput="calc()"></td>
                <td><input type="number" class="v-kg" value="0" oninput="calc()"></td>
                <td><input type="number" class="v-d" value="0" step="0.01" oninput="calc()"></td>
                <td><input type="number" class="v-b" value="0" step="0.01" oninput="calc()"></td>
                <td><input type="number" class="v-h" value="0" step="0.01" oninput="calc()"></td>
                <td class="r-cub result-cell">0.000</td>
                <td class="r-kg-s result-cell">0</td>
                <td class="r-cub-s result-cell yellow-bg">0</td>
                <td class="r-total result-cell yellow-bg">0</td>
            `;
      document.getElementById('tableBody').appendChild(row);
    }

    function calc() {
      const pKg = parseFloat(document.getElementById('p-kg').value) || 0;
      const pCub = parseFloat(document.getElementById('p-cub').value) || 0;
      let tc = 0, tk = 0, tcu = 0, tkm = 0, tcm = 0, ta = 0;
      document.querySelectorAll('#tableBody tr').forEach(r => {
        const k = +r.querySelector('.v-kg').value || 0, c = +r.querySelector('.v-cnt').value || 0;
        const d = +r.querySelector('.v-d').value || 0, b = +r.querySelector('.v-b').value || 0, h = +r.querySelector('.v-h').value || 0;
        const cub = d * b * h, kS = k * pKg, cS = cub * pCub, tot = kS + cS;
        r.querySelector('.r-cub').innerText = cub.toFixed(3);
        r.querySelector('.r-kg-s').innerText = kS.toFixed(1);
        r.querySelector('.r-cub-s').innerText = cS.toFixed(1);
        r.querySelector('.r-total').innerText = tot.toFixed(1);
        tc += c; tk += k; tcu += cub; tkm += kS; tcm += cS; ta += tot;
      });
      document.getElementById('t-count').innerText = tc;
      document.getElementById('t-kg').innerText = tk.toFixed(1);
      document.getElementById('t-cub').innerText = tcu.toFixed(3);
      document.getElementById('t-kg-money').innerText = tkm.toFixed(1);
      document.getElementById('t-cub-money').innerText = tcm.toFixed(1);
      document.getElementById('t-total').innerText = ta.toFixed(1);
    }

    function saveToExcel() {
      // Интихоби ҷадвал
      const table = document.getElementById("cargoTable");

      // Сохтани нусхаи ҷадвал барои Excel (бе input-ҳо)
      const wb = XLSX.utils.book_new();
      const ws_data = [];

      // Сарлавҳаҳо (Headers)
      ws_data.push(["№", "Сана", "Адрес", "Ном", "Тел", "Шум", "Кг", "Д", "Б", "В", "Куб", "Кг Сум", "Куб Сум", "Ҳамагӣ"]);

      // Маълумоти сатрҳо
      document.querySelectorAll('#tableBody tr').forEach(r => {
        const row = [
          r.cells[0].innerText,
          r.querySelector('.v-date').value,
          r.querySelector('.v-addr').value,
          r.querySelector('.v-name').value,
          r.querySelector('.v-tel').value,
          r.querySelector('.v-cnt').value,
          r.querySelector('.v-kg').value,
          r.querySelector('.v-d').value,
          r.querySelector('.v-b').value,
          r.querySelector('.v-h').value,
          r.querySelector('.r-cub').innerText,
          r.querySelector('.r-kg-s').innerText,
          r.querySelector('.r-cub-s').innerText,
          r.querySelector('.r-total').innerText
        ];
        ws_data.push(row);
      });

      // Илова кардани ҶАМЪБАСТ
      ws_data.push([]);
      ws_data.push(["", "", "", "", "ҶАМЪБАСТ:",
        document.getElementById('t-count').innerText,
        document.getElementById('t-kg').innerText,
        "", "", "",
        document.getElementById('t-cub').innerText,
        document.getElementById('t-kg-money').innerText,
        document.getElementById('t-cub-money').innerText,
        document.getElementById('t-total').innerText
      ]);

      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      XLSX.utils.book_append_sheet(wb, ws, "Cargo_Report");
      XLSX.writeFile(wb, `barodar_cargo_${today}.xlsx`);
    }

    function saveToFile() {
      let txt = "BARODAR CARGO - Ҳисобот\n";
      document.querySelectorAll('#tableBody tr').forEach((r, i) => {
        const n = r.querySelector('.v-name').value || "-", k = r.querySelector('.v-kg').value;
        const sum = r.querySelector('.r-total').innerText;
        if (k > 0) txt += `${i + 1}. ${n} | ${k}кг | ${sum} смн\n`;
      });
      const blob = new Blob([txt], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `cargo_${new Date().getTime()}.txt`;
      a.click();
    }

    for (let i = 0; i < 5; i++) addRow();
  </script>
</body>

</html>
